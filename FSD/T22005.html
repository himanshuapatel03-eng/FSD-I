<head>
    <style>
        body{margin: 50px;}
        p::first-line{color: red}
        p::first-letter{color: blue;font-size: 50px}
        .a::after{content: "####";color: cyan;}
        .a::before{content: "***";color: aquamarine;}
        li::marker{color: green;content: "🐥😎💜 💛";}
        ::selection{background-color: yellow;color: orange}

    </style>
</head>
<body>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Labore molestias est harum, officiis eiciendis commodi eligendi libero.</p>
    <h1 class="a">Hello</h1>
    <ul>
        <li>ABC</li>
        <li>PQR</li>
    </ul>
</body>
