<head>
    <style>
        button:hover{background-color: blue}
        button:active{background-color: green}
        input:focus{background-color: cyan}
        ul li:nth-child(2){background-color: red; font-weight:bold}
        ul li:not(.special){font-style: italic;background-color: rgb(123, 255, 71);color: purple}
    </style>
</head>
<body>
    <button value="Click Me">Click Me</button>
    <input type="text">
    <ul type="square">
        <li>first child</li>
        <li class="special">second child</li>
        <li class="special ">Not Eligible</li>
        <li>Last child</li>
    </ul>
</body>
