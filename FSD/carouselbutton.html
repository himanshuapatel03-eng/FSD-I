<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="carousel slide" data-bs-ride="carousel" data-bs-pause="hover" id="cc">
        <div class="carousel-indicators">
            <button class="active" type="button" data-bs-target="#cc" data-bs-slide-to="0"></button>
            <button type="button" class="bg-info"  data-bs-target="#cc" data-bs-slide-to="1"></button>
            <button type="button" class="bg-danger" data-bs-target="#cc" data-bs-slide-to="2"></button>
        </div>
         <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="5000">
                <img src="d1.jpeg" class="d-block w-100" style="height: 300px">
            </div>
            <!-- for captions -->
             <div class="carousel-caption">
                <h5>first slide</h5>
                <a href="#" class="btn btn-danger">Click Me</a> 
             </div>
            <div class="carousel-item " data-bs-interval="5000">
                <img src="g1.jpeg" class="d-block w-100" style="height: 300px">
            </div>
            <div class="carousel-item " data-bs-interval="5000">
                <img src="d3.jpeg" class="d-block w-100" style="height: 300px">
            </div> 
        </div>
        <!-- for arrow -->
        <button class="carousel-control-prev" type="button" data-bs-target="#cc" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
         <button class="carousel-control-next" type="button" data-bs-target="#cc" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button> 
    </div>
</body>
