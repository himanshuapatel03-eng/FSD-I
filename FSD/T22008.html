<head>
    <style>
        .container{background-color: yellow;display: grid;grid-template-columns:repeat(4,1fr);grid-template-rows: 1fr 2fr;padding: 10px;}
        .item{background-color: cyan;text-align: center;padding: 20px;border: 1px solid red;margin: 5px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="item">200px</div>
        <div class="item">1fr</div>
        <div class="item">2fr</div>
        <div class="item">3fr</div>
        <div class="item">4fr</div>
    </div>
</body>
